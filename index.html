<div id="lcv-container">
    <div class="lcv-header">
        <h2>本地角色卡存储库</h2>
        <div class="lcv-actions">
            <input type="file" id="lcv-upload-input" accept="image/png" multiple style="display: none;">
            <button id="lcv-upload-btn" class="menu_button">上传角色卡到浏览器</button>
        </div>
    </div>
    <div id="lcv-gallery" class="lcv-gallery">
        <!-- 角色卡将动态渲染在这里 -->
    </div>
</div>

<!-- 角色卡详情弹窗模板 -->
<div id="lcv-details-template" style="display: none;">
    <div class="lcv-details-view">
        <img class="lcv-details-img" src="" alt="Avatar">
        <div class="lcv-details-info">
            <h3 class="lcv-details-name"></h3>
            <p class="lcv-details-desc"></p>
            <button class="menu_button lcv-import-btn">一键导入到酒馆</button>
            <button class="menu_button lcv-delete-btn" style="background: #a00;">从浏览器删除</button>
        </div>
    </div>
</div>
